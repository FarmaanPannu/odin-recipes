<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mashed Potatoes</title>
</head>
<body>
    <h1>Mashed Potatoes</h1>
     <img src="../images/mashed_potatoes.jpeg" alt="Mashed Potatoes" width="300">
     <h3>Ingredients</h3>
    <ul>
        <li>500 g yukon gold potatoes</li>
        <li>80 g butter</li>
        <li>100 g milk</li>
        <li>Black Pepper</li>
        <li>Salt</li>
    </ul>

     <h3>Steps</h3>
     
     <ol>
        <li>Boil Potatoes</li>
        <li>Drain Potatoes</li>
        <li>Mash Potatoes</li>
        <li>Heat Butter and Milk</li>
        <li>Combine</li>
     </ol>
</body>
</html>
